<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DataPilot - AI Copilot</title>
    <script crossorigin src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/dayjs@1.11.10/dayjs.min.js"></script>
    <script src="https://unpkg.com/antd@5.12.2/dist/antd.min.js"></script>
    <script src="https://unpkg.com/antd@5.12.2/dist/locale/zh_CN.js"></script>
    <script src="https://unpkg.com/@ant-design/icons@5.2.6/dist/index.umd.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/antd@5.12.2/dist/reset.css">
    <style>
        :root { --color-primary: #1677ff; --color-bg-page: #f5f7fa; --color-sidebar: #001529; }
        body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; background: var(--color-bg-page); color: #1f1f1f; overflow: hidden; }
        .app-layout { display: flex; height: 100vh; overflow: hidden; }
        .app-sider { width: 220px; min-width: 220px; background: var(--color-sidebar); display: flex; flex-direction: column; flex-shrink: 0; }
        .logo-area { height: 64px; display: flex; align-items: center; justify-content: center; gap: 12px; padding: 0 16px; }
        .logo-icon-small { width: 28px; height: 28px; background: radial-gradient(circle at center, #722ed1 0%, #1677ff 100%); border-radius: 6px; box-shadow: 0 2px 8px rgba(22, 119, 255, 0.4); flex-shrink: 0; }
        .logo-title { font-size: 18px; font-weight: 700; color: #fff; letter-spacing: 0.5px; }
        .sider-menu { flex: 1; padding: 8px 12px; }
        .sider-menu-item { height: 44px; display: flex; align-items: center; padding: 0 16px; gap: 12px; border-radius: 8px; color: rgba(255,255,255,0.65); margin-bottom: 4px; cursor: pointer; transition: all 0.2s; font-size: 14px; text-decoration: none; }
        .sider-menu-item:hover { color: #fff; background: rgba(255,255,255,0.08); }
        .sider-menu-item.active { background: var(--color-primary); color: #fff; }
        .app-right { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .app-header { background: var(--color-sidebar); padding: 0 24px; display: flex; align-items: center; justify-content: space-between; height: 64px; flex-shrink: 0; }
        .header-left { flex: 1; display: flex; align-items: center; }
        .top-menu { display: flex; align-items: center; gap: 4px; flex: 1; }
        .top-menu-item { color: rgba(255,255,255,0.65); font-size: 14px; padding: 0 12px; height: 64px; display: flex; align-items: center; cursor: pointer; border-bottom: 2px solid transparent; text-decoration: none; white-space: nowrap; }
        .top-menu-item.active { color: #fff; font-weight: 500; border-bottom-color: var(--color-primary); }
        .header-right { display: flex; align-items: center; gap: 16px; color: rgba(255,255,255,0.85); flex-shrink: 0; }
        .app-content { flex: 1; overflow: hidden; display: flex; }

        /* Copilot Layout */
        .copilot-full { display: flex; flex: 1; background: #fff; }
        .copilot-sidebar { width: 280px; flex-shrink: 0; border-right: 1px solid #f0f0f0; display: flex; flex-direction: column; background: #fafbfc; }
        .sidebar-header { display: flex; align-items: center; justify-content: space-between; padding: 16px; border-bottom: 1px solid #f0f0f0; }
        .sidebar-title { font-size: 15px; font-weight: 600; color: #1e293b; }
        .sidebar-list { flex: 1; overflow-y: auto; padding: 8px; }
        .conv-item { padding: 12px; border-radius: 8px; cursor: pointer; margin-bottom: 4px; transition: all 0.2s; }
        .conv-item:hover { background: #f0f5ff; }
        .conv-item.active { background: #e6f0ff; border: 1px solid rgba(22, 119, 255, 0.2); }
        .conv-item-title { font-size: 14px; font-weight: 500; color: #1e293b; margin-bottom: 4px; }
        .conv-item-preview { font-size: 12px; color: #94a3b8; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; margin-bottom: 4px; }
        .conv-item-time { font-size: 11px; color: #c0c0c0; }

        .copilot-main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
        .chat-area { flex: 1; overflow-y: auto; padding: 24px 32px; }
        .chat-input-area { padding: 16px 32px 24px; border-top: 1px solid #f0f0f0; display: flex; gap: 12px; align-items: flex-end; }

        .msg { margin-bottom: 24px; display: flex; gap: 12px; }
        .msg-user { flex-direction: row-reverse; }
        .msg-avatar { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 600; flex-shrink: 0; }
        .msg-avatar-user { background: #ffb4a2; color: #fff; }
        .msg-avatar-ai { background: linear-gradient(135deg, #667eea, #764ba2); color: #fff; }
        .msg-bubble { max-width: 70%; padding: 12px 16px; border-radius: 12px; line-height: 1.6; font-size: 14px; }
        .msg-bubble-user { background: #1677ff; color: #fff; border-bottom-right-radius: 4px; }
        .msg-bubble-ai { background: #f5f7fa; color: #1f1f1f; border-bottom-left-radius: 4px; }
        .msg-bubble-ai code { background: #e8e8e8; padding: 2px 6px; border-radius: 4px; font-size: 13px; }
        .msg-bubble-ai pre { background: #1e293b; color: #e2e8f0; padding: 12px 16px; border-radius: 8px; overflow-x: auto; font-size: 13px; margin: 8px 0; }

        .suggestion-chips { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
        .suggestion-chip { padding: 6px 14px; border-radius: 20px; border: 1px solid #e2e8f0; background: #fff; color: #475569; font-size: 13px; cursor: pointer; transition: all 0.2s; }
        .suggestion-chip:hover { border-color: #1677ff; color: #1677ff; background: #f0f7ff; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useRef, useEffect } = React;
        const { Button, Input, Avatar } = antd;
        const { HomeOutlined, DashboardOutlined, SearchOutlined, AppstoreOutlined, FolderOutlined, TableOutlined, RobotOutlined, QuestionCircleOutlined, BellOutlined, PlusOutlined, SendOutlined } = icons;

        const CONVERSATIONS = [
            { id: 'c1', title: '查询订单表的字段信息', messages: [
                { role: 'user', content: '帮我查一下 ods_order_detail 这张表有哪些字段？' },
                { role: 'ai', content: '`ods_order_detail` 表共有 12 个字段：\n\n1. `order_id` (BIGINT) - 订单唯一标识 [PK]\n2. `user_id` (BIGINT) - 下单用户ID\n3. `product_id` (BIGINT) - 商品ID\n4. `order_amount` (DECIMAL) - 订单金额\n5. `pay_channel` (VARCHAR) - 支付渠道\n6. `order_status` (INT) - 订单状态\n7. `province` (VARCHAR) - 收货省份\n8. `city` (VARCHAR) - 收货城市\n9. `create_time` (TIMESTAMP) - 创建时间\n10. `update_time` (TIMESTAMP) - 更新时间\n11. `is_deleted` (TINYINT) - 逻辑删除标记\n12. `dt` (VARCHAR) - 分区字段' },
            ] },
            { id: 'c2', title: '生成 SQL 查询语句', messages: [
                { role: 'user', content: '帮我写一个查询最近7天订单量Top10城市的SQL' },
                { role: 'ai', content: '好的，以下是查询最近7天订单量 Top10 城市的 SQL：\n\n```sql\nSELECT city, COUNT(*) AS order_count\nFROM ods_order_detail\nWHERE dt >= date_sub(current_date(), 7)\n  AND order_status = 1\n  AND is_deleted = 0\nGROUP BY city\nORDER BY order_count DESC\nLIMIT 10;\n```\n\n注意事项：\n- 使用 `dt` 分区字段过滤，避免全表扫描\n- `order_status = 1` 只统计已支付订单\n- 排除了逻辑删除的记录' },
            ] },
            { id: 'c3', title: '分析表血缘关系', messages: [
                { role: 'user', content: 'ods_order_detail 的上下游血缘是怎样的？' },
                { role: 'ai', content: '`ods_order_detail` 的血缘关系如下：\n\n**上游来源（3张表）：**\n- `ods_order_raw` (MySQL) - 订单原始数据\n- `ods_payment_raw` (MySQL) - 支付原始数据\n- `ods_user_raw` (MySQL) - 用户原始数据\n\n**下游消费（3张表）：**\n- `dwd_trade_order_detail` (Hive) - 交易订单明细事实表\n- `dws_sku_sale_daily` (Hive) - SKU 日销量汇总\n- `ads_order_summary` (StarRocks) - 订单汇总报表\n\n建议查看详情页的"血缘关系" Tab 获取完整的 DAG 视图。' },
            ] },
        ];

        const SUGGESTIONS = ['查询表的字段信息', '生成 SELECT 语句', '分析数据血缘', '推荐相关表', '解释表的业务含义'];

        const SIDER_ITEMS = [
            { key: 'home', icon: React.createElement(HomeOutlined), label: '首页', href: 'index.html' },
            { key: 'dashboard', icon: React.createElement(DashboardOutlined), label: '资产大盘', href: 'dashboard.html' },
            { key: 'search', icon: React.createElement(SearchOutlined), label: '资产检索', href: 'search.html' },
            { key: 'catalog', icon: React.createElement(AppstoreOutlined), label: '资产目录', href: 'catalog.html' },
            { key: 'topics', icon: React.createElement(FolderOutlined), label: '数据专题', href: 'topics.html' },
            { key: 'mytables', icon: React.createElement(TableOutlined), label: '我的库表', href: 'mytables.html' },
            { key: 'copilot', icon: React.createElement(RobotOutlined), label: 'AI Copilot', href: 'copilot.html' },
        ];
        const TOP_MENU = [{key:'integration',label:'数据集成'},{key:'dev',label:'数据开发'},{key:'publish',label:'发布中心'},{key:'schedule',label:'调度管理'},{key:'ops',label:'监控运维'},{key:'quality',label:'数据质量'},{key:'map',label:'数据地图'},{key:'security',label:'安全中心'},{key:'project',label:'项目管理'}];
        const offsets = ['2 小时前', '昨天', '3 天前'];

        const CopilotPage = () => {
            const [activeConv, setActiveConv] = useState(CONVERSATIONS[0].id);
            const [inputVal, setInputVal] = useState('');
            const [messages, setMessages] = useState(CONVERSATIONS[0].messages);
            const chatEndRef = useRef(null);

            useEffect(() => { chatEndRef.current?.scrollIntoView({ behavior: 'smooth' }); }, [messages]);

            const switchConv = (id) => {
                setActiveConv(id);
                const conv = CONVERSATIONS.find(c => c.id === id);
                setMessages(conv ? conv.messages : []);
            };

            const sendMsg = (text) => {
                const q = (text || inputVal || '').trim();
                if (!q) return;
                setMessages(prev => [...prev, { role: 'user', content: q }]);
                setInputVal('');
                setTimeout(() => {
                    setMessages(prev => [...prev, { role: 'ai', content: `收到你的问题："${q}"\n\n我正在分析相关的数据资产信息，请稍候...\n\n（这是一个 Demo 演示，实际产品中会调用 AI 引擎进行智能回答。）` }]);
                }, 800);
            };

            const renderContent = (text) => {
                const parts = text.split(/(```[\s\S]*?```|`[^`]+`)/g);
                return parts.map((part, i) => {
                    if (part.startsWith('```')) {
                        const code = part.replace(/^```\w*\n?/, '').replace(/\n?```$/, '');
                        return <pre key={i}>{code}</pre>;
                    }
                    if (part.startsWith('`') && part.endsWith('`')) {
                        return <code key={i}>{part.slice(1, -1)}</code>;
                    }
                    return part.split('\n').map((line, j) => <span key={`${i}-${j}`}>{line}<br /></span>);
                });
            };

            return (
                <div className="app-layout">
                    <div className="app-sider"><div className="logo-area"><div className="logo-icon-small"></div><span className="logo-title">DataPilot</span></div><div className="sider-menu">{SIDER_ITEMS.map(i=><a key={i.key} className={`sider-menu-item ${i.key==='copilot'?'active':''}`} href={i.href}>{i.icon}<span>{i.label}</span></a>)}</div></div>
                    <div className="app-right">
                        <header className="app-header"><div className="header-left"><div className="top-menu">{TOP_MENU.map(i=><a key={i.key} className={`top-menu-item ${i.key==='map'?'active':''}`} href="#">{i.label}</a>)}</div></div><div className="header-right"><QuestionCircleOutlined style={{fontSize:16,color:'rgba(255,255,255,0.85)'}} /><BellOutlined style={{fontSize:16,color:'rgba(255,255,255,0.85)'}} /><Avatar size={32} style={{backgroundColor:'#ffb4a2',color:'#fff'}}>王</Avatar></div></header>
                        <div className="app-content">
                            <div className="copilot-full">
                                <div className="copilot-sidebar">
                                    <div className="sidebar-header">
                                        <span className="sidebar-title">对话历史</span>
                                        <Button type="primary" size="small" icon={<PlusOutlined />} onClick={() => { setActiveConv(''); setMessages([]); }}>新对话</Button>
                                    </div>
                                    <div className="sidebar-list">
                                        {CONVERSATIONS.map((conv, idx) => (
                                            <div key={conv.id} className={`conv-item ${activeConv === conv.id ? 'active' : ''}`} onClick={() => switchConv(conv.id)}>
                                                <div className="conv-item-title">{conv.title}</div>
                                                <div className="conv-item-preview">{conv.messages[conv.messages.length-1]?.content?.slice(0,40)}...</div>
                                                <div className="conv-item-time">{offsets[idx] || '1 周前'}</div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                                <div className="copilot-main">
                                    <div className="chat-area">
                                        {messages.length === 0 && (
                                            <div style={{textAlign:'center',paddingTop:80}}>
                                                <div style={{fontSize:48,marginBottom:16}}>
                                                    <RobotOutlined style={{color:'#1677ff'}} />
                                                </div>
                                                <h2 style={{color:'#1e293b',marginBottom:8}}>DataPilot AI Copilot</h2>
                                                <p style={{color:'#64748b',marginBottom:32}}>智能数据助手，帮你快速理解和使用数据资产</p>
                                                <div className="suggestion-chips" style={{justifyContent:'center'}}>
                                                    {SUGGESTIONS.map(s => <span key={s} className="suggestion-chip" onClick={() => sendMsg(s)}>{s}</span>)}
                                                </div>
                                            </div>
                                        )}
                                        {messages.map((msg, i) => (
                                            <div key={i} className={`msg ${msg.role === 'user' ? 'msg-user' : ''}`}>
                                                <div className={`msg-avatar ${msg.role === 'user' ? 'msg-avatar-user' : 'msg-avatar-ai'}`}>
                                                    {msg.role === 'user' ? '王' : 'AI'}
                                                </div>
                                                <div className={`msg-bubble ${msg.role === 'user' ? 'msg-bubble-user' : 'msg-bubble-ai'}`}>
                                                    {renderContent(msg.content)}
                                                </div>
                                            </div>
                                        ))}
                                        <div ref={chatEndRef}></div>
                                    </div>
                                    <div className="chat-input-area">
                                        <Input.TextArea
                                            value={inputVal}
                                            onChange={e => setInputVal(e.target.value)}
                                            placeholder="输入你的问题... 支持 @表名 引用数据资产"
                                            autoSize={{ minRows: 1, maxRows: 4 }}
                                            onPressEnter={e => { if (!e.shiftKey) { e.preventDefault(); sendMsg(); } }}
                                            style={{ flex: 1, borderRadius: 12 }}
                                        />
                                        <Button type="primary" icon={<SendOutlined />} onClick={() => sendMsg()} style={{borderRadius:12,height:40}}>发送</Button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<antd.ConfigProvider theme={{token:{colorPrimary:'#1677ff',borderRadius:6,fontFamily:'system-ui'}}} locale={antd.locale?.zh_CN}><CopilotPage /></antd.ConfigProvider>);
    </script>
</body>
</html>
