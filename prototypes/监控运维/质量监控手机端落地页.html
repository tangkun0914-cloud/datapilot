<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>告警详情 - 移动端</title>
    
    <!-- 1. 核心库 -->
    <script crossorigin src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- 2. 图标库 -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <style>
        body { background-color: #f5f6fa; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; -webkit-tap-highlight-color: transparent; }
        
        /* 关键帧动画 */
        @keyframes slideInUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .anim-slide-up { animation: slideInUp 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        
        @keyframes pulse-soft { 0% { box-shadow: 0 0 0 0 rgba(24, 144, 255, 0.2); } 70% { box-shadow: 0 0 0 10px rgba(24, 144, 255, 0); } 100% { box-shadow: 0 0 0 0 rgba(24, 144, 255, 0); } }
        .btn-pulse { animation: pulse-soft 2s infinite; }

        /* 详情列表样式 */
        .detail-item { display: flex; padding: 12px 0; border-bottom: 1px solid #f0f0f0; align-items: flex-start; }
        .detail-item:last-child { border-bottom: none; }
        .detail-label { width: 90px; color: #8c8c8c; font-size: 13px; flex-shrink: 0; }
        .detail-value { flex: 1; color: #262626; font-size: 13px; font-weight: 500; word-break: break-all; }
        
        /* 链接卡片 */
        .link-card:active { background-color: #f5f5f5; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // ================== 主页面 ==================
        const AlertDetailPage = () => {
            // 状态：firing(触发中) -> claiming(认领中) -> acked(处理中) -> silenced(已屏蔽)
            const [status, setStatus] = useState('firing');
            const [showToast, setShowToast] = useState(false);
            const [toastMsg, setToastMsg] = useState('');
            
            // 演示模式切换：'ERROR' (强规则) 或 'WARN' (弱规则)
            const [mode, setMode] = useState('ERROR');

            // 模拟数据 - 强规则 (ERROR)
            const dataError = {
                title: 'hive_dwd.dwd_trade_order_di',
                spaceName: '国内数仓', 
                source: '数据质量',
                monitorEvent: '质量规则-触发异常阈值',
                qualityMonitorName: '核心表日常监控',
                ruleName: 'order_amount空值校验',
                owner: '王蕊 (ruiwang1)',
                ownerInitial: '王',
                triggerTime: '2025-12-16 14:00:05',
                severity: 'ERROR',
                duration: '2h 30m',
                monitorLink: 'https://ops.example.com/monitor/detail/100293'
            };

            // 模拟数据 - 弱规则 (WARN)
            const dataWarn = {
                title: 'hive_ods.ods_log_info_df',
                spaceName: '国内数仓', 
                source: '数据质量',
                monitorEvent: '质量规则-触发异常阈值',
                qualityMonitorName: 'ODS层常规监控',
                ruleName: 'ext_json解析校验, device_id空值校验, user_agent解析校验',
                owner: '张三 (zhangsan)',
                ownerInitial: '张',
                triggerTime: '2025-12-16 10:05:00',
                severity: 'WARN',
                duration: '2h 30m',
                monitorLink: 'https://ops.example.com/monitor/detail/100303'
            };

            const data = mode === 'ERROR' ? dataError : dataWarn;

            // 动作：认领
            const handleClaim = () => {
                setStatus('claiming');
                setTimeout(() => {
                    setStatus('acked'); 
                    triggerToast('认领成功', '状态已更新为“处理中”');
                }, 800);
            };

            // 动作：屏蔽
            const handleSilence = (duration) => {
                setStatus('silenced');
                triggerToast('屏蔽成功', `告警将暂时屏蔽 ${duration}`);
            };

            // 动作：取消屏蔽
            const handleUnSilence = () => {
                setStatus('firing');
                triggerToast('已取消屏蔽', '告警恢复为“触发中”');
            };

            const triggerToast = (title, desc) => {
                setToastMsg({ title, desc });
                setShowToast(true);
                setTimeout(() => setShowToast(false), 2500);
            };

            // ================== 状态样式计算逻辑 ==================
            // 基础主题色由 mode 决定 (ERROR=红, WARN=橙)
            let defaultThemeColor = mode === 'ERROR' ? '#f5222d' : '#fa8c16';
            let defaultBadgeDot = mode === 'ERROR' ? 'bg-red-500' : 'bg-orange-500';
            let defaultStatusBg = mode === 'ERROR' ? 'bg-red-50' : 'bg-orange-50';
            let defaultStatusTextCls = mode === 'ERROR' ? 'text-red-600' : 'text-orange-600';
            
            let themeColor = defaultThemeColor;
            let statusText = '触发中';
            let statusBg = defaultStatusBg;
            let statusTextCls = defaultStatusTextCls;
            let badgeDot = defaultBadgeDot;

            if (status === 'acked') {
                themeColor = '#1890ff'; // 蓝 (处理中)
                statusText = '处理中';
                statusBg = 'bg-blue-50';
                statusTextCls = 'text-blue-600';
                badgeDot = 'bg-blue-500';
            } else if (status === 'silenced') {
                themeColor = '#722ed1'; // 紫 (已屏蔽)
                statusText = '已屏蔽';
                statusBg = 'bg-purple-50';
                statusTextCls = 'text-purple-600';
                badgeDot = 'bg-purple-500';
            }

            return (
                <div className="min-h-screen pb-24 relative">
                    
                    {/* 1. 顶部导航 */}
                    <div className="bg-white sticky top-0 z-50 px-4 h-12 flex items-center justify-between border-b border-gray-100 shadow-sm">
                        <div className="text-gray-600 text-lg"><i className="fas fa-chevron-left"></i></div>
                        <div className="font-semibold text-gray-800">告警详情</div>
                        <div className="text-gray-400"><i className="fas fa-share-alt"></i></div>
                    </div>

                    {/* 演示模式切换按钮 */}
                    <div className="px-4 pt-4 pb-1">
                        <div className="bg-white rounded-lg p-1 flex shadow-sm border border-gray-200">
                            <button 
                                onClick={() => setMode('ERROR')}
                                className={`flex-1 py-1.5 text-xs font-bold rounded-md transition-all ${mode === 'ERROR' ? 'bg-red-50 text-red-600 shadow-sm' : 'text-gray-500 hover:bg-gray-50'}`}
                            >
                                强规则 (ERROR)
                            </button>
                            <button 
                                onClick={() => setMode('WARN')}
                                className={`flex-1 py-1.5 text-xs font-bold rounded-md transition-all ${mode === 'WARN' ? 'bg-orange-50 text-orange-600 shadow-sm' : 'text-gray-500 hover:bg-gray-50'}`}
                            >
                                弱规则 (WARN)
                            </button>
                        </div>
                    </div>

                    <div className="p-4 space-y-4 pt-2">
                        
                        {/* 2. 状态核心卡片 */}
                        <div className={`bg-white rounded-xl p-5 shadow-sm border-t-4 anim-slide-up transition-colors duration-500`} 
                             style={{borderColor: themeColor}}>
                            
                            <div className="flex justify-between items-start mb-3">
                                <div className="flex items-center gap-2">
                                    <span className={`px-2 py-0.5 rounded text-xs font-bold border ${mode === 'ERROR' ? 'border-red-200 bg-red-50 text-red-600' : 'border-orange-200 bg-orange-50 text-orange-600'}`}>
                                        {data.severity}
                                    </span>
                                    
                                    {/* 状态徽标 */}
                                    <div className={`px-2 py-0.5 rounded-full text-xs font-bold flex items-center gap-1.5 transition-colors duration-500 ${statusBg} ${statusTextCls}`}>
                                        {status === 'silenced' ? (
                                             <i className="fas fa-bell-slash text-[10px]"></i>
                                        ) : (
                                            <span className={`w-2 h-2 rounded-full transition-colors duration-500 ${badgeDot} ${status === 'firing' ? 'animate-pulse' : ''}`}></span>
                                        )}
                                        {statusText}
                                    </div>
                                </div>
                                <div className="text-xs text-gray-400 font-mono">ID: E-100293</div>
                            </div>

                            <h1 className="text-xl font-bold text-gray-800 break-words leading-tight mb-2">
                                {data.title}
                            </h1>
                            
                            <div className="text-sm text-gray-500">
                                持续时长: <span className="font-medium text-gray-700">{data.duration}</span>
                            </div>
                        </div>

                        {/* 3. 详细信息列表 */}
                        <div className="bg-white rounded-xl shadow-sm px-4 py-2 anim-slide-up" style={{animationDelay: '0.1s'}}>
                            <div className="detail-item">
                                <div className="detail-label">所属空间</div>
                                <div className="detail-value flex items-center gap-1">
                                    <i className="fas fa-layer-group text-blue-500 text-xs"></i>
                                    {data.spaceName}
                                </div>
                            </div>
                            <div className="detail-item">
                                <div className="detail-label">告警来源</div>
                                <div className="detail-value">{data.source}</div>
                            </div>
                            <div className="detail-item">
                                <div className="detail-label">监控事件</div>
                                <div className="detail-value">{data.monitorEvent}</div>
                            </div>
                            <div className="detail-item">
                                <div className="detail-label">数据表名</div>
                                <div className="detail-value font-mono text-gray-600 bg-gray-50 px-1 rounded">{data.title}</div>
                            </div>
                            <div className="detail-item">
                                <div className="detail-label">质量监控</div>
                                <div className="detail-value text-blue-600">{data.qualityMonitorName}</div>
                            </div>
                            <div className="detail-item">
                                <div className="detail-label">规则名称</div>
                                <div className="detail-value">{data.ruleName}</div>
                            </div>
                            <div className="detail-item">
                                <div className="detail-label">首次触发</div>
                                <div className="detail-value">{data.triggerTime}</div>
                            </div>
                            <div className="detail-item">
                                <div className="detail-label">表负责人</div>
                                <div className="detail-value flex items-center">
                                    <div className="w-5 h-5 bg-blue-100 text-blue-600 rounded-full text-xs flex items-center justify-center mr-2">
                                        {data.ownerInitial}
                                    </div>
                                    {data.owner}
                                </div>
                            </div>
                        </div>

                        {/* 4. 监控中心超链 */}
                        <a href="#" className="block bg-white rounded-xl shadow-sm p-4 flex items-center justify-between link-card anim-slide-up group" style={{animationDelay: '0.2s'}}>
                            <div className="flex items-center gap-3">
                                <div className="w-10 h-10 rounded-full bg-indigo-50 text-indigo-500 flex items-center justify-center text-lg">
                                    <i className="fas fa-chart-line"></i>
                                </div>
                                <div>
                                    <div className="text-sm font-bold text-gray-800">监控运维中心</div>
                                    <div className="text-xs text-gray-400">点击定位至该告警事件上下文</div>
                                </div>
                            </div>
                            <i className="fas fa-chevron-right text-gray-300 group-hover:text-indigo-500 transition-colors"></i>
                        </a>

                        <div className="h-4"></div>
                    </div>

                    {/* 5. 底部操作栏 */}
                    <div className="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-100 p-4 pb-6 shadow-[0_-4px_20px_rgba(0,0,0,0.05)] z-40 flex gap-3">
                        {status === 'acked' ? (
                            // 场景A: 认领后 -> 显示“标记已解决”
                            <div className="flex-1 flex gap-3 anim-slide-up">
                                <button className="flex-1 h-11 bg-green-500 text-white rounded-lg font-bold shadow-lg shadow-green-200 active:scale-95 transition-transform flex items-center justify-center gap-2">
                                    <i className="fas fa-check-circle"></i> 标记已解决
                                </button>
                            </div>
                        ) : status === 'silenced' ? (
                            // 场景B: 已屏蔽 -> 显示“取消屏蔽”和“认领”
                             <div className="flex-1 flex gap-3 anim-slide-up">
                                <button onClick={handleUnSilence} className="flex-1 h-11 bg-white border border-gray-300 text-gray-600 rounded-lg font-medium active:bg-gray-50">
                                    取消屏蔽
                                </button>
                                <button onClick={handleClaim} className="flex-[1.5] h-11 bg-blue-600 text-white rounded-lg font-bold shadow-lg shadow-blue-200 active:scale-95 transition-transform">
                                    认领
                                </button>
                            </div>
                        ) : (
                            // 场景C: 默认触发中 -> 显示“屏蔽1h”、“屏蔽2h”、“认领”
                            <div className="flex-1 flex gap-2">
                                <button 
                                    onClick={() => handleSilence('1小时')}
                                    className="flex-1 h-11 bg-white border border-gray-300 text-gray-600 rounded-lg text-sm font-medium active:bg-gray-50 whitespace-nowrap"
                                >
                                    屏蔽1h
                                </button>
                                <button 
                                    onClick={() => handleSilence('2小时')}
                                    className="flex-1 h-11 bg-white border border-gray-300 text-gray-600 rounded-lg text-sm font-medium active:bg-gray-50 whitespace-nowrap"
                                >
                                    屏蔽2h
                                </button>
                                <button 
                                    onClick={handleClaim}
                                    disabled={status === 'claiming'}
                                    className={`flex-[1.5] h-11 bg-blue-600 text-white rounded-lg font-bold shadow-lg shadow-blue-200 flex items-center justify-center gap-1 transition-all text-sm ${status === 'claiming' ? 'opacity-80' : 'active:scale-95 btn-pulse'}`}
                                >
                                    {status === 'claiming' ? (
                                        <><i className="fas fa-spinner fa-spin"></i> 提交中...</>
                                    ) : (
                                        <><i className="far fa-hand-paper"></i> 认领</>
                                    )}
                                </button>
                            </div>
                        )}
                    </div>

                    {/* 全局 Toast */}
                    {showToast && (
                        <div className="fixed top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 bg-black/80 text-white px-6 py-4 rounded-xl shadow-2xl flex flex-col items-center gap-2 z-50 anim-slide-up backdrop-blur-md text-center">
                            <div className="w-10 h-10 rounded-full bg-green-500 text-white flex items-center justify-center text-xl">
                                <i className="fas fa-check"></i>
                            </div>
                            <div className="font-medium">{toastMsg.title}</div>
                            {toastMsg.desc && <div className="text-xs text-gray-300">{toastMsg.desc}</div>}
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<AlertDetailPage />);
    </script>
</body>
</html>
