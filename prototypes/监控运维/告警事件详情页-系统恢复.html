<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>监控事件进度条 - 独立运行版</title>
    
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- 引入 React 和 ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    
    <!-- 引入 Babel 用于解析 JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        /* 简单的 Loading 样式 */
        #root:empty::before {
            content: 'Loading...';
            display: block;
            text-align: center;
            padding: 20px;
            color: #666;
        }
    </style>
</head>
<body class="bg-gray-50">
    <div id="root"></div>

    <script type="text/babel">
        // ----------------------------------------------------------------------
        // 1. 图标组件定义 (替代 lucide-react import)
        // ----------------------------------------------------------------------
        
        const IconBase = ({ size = 24, strokeWidth = 2, children, ...props }) => (
            <svg 
                xmlns="http://www.w3.org/2000/svg" 
                width={size} 
                height={size} 
                viewBox="0 0 24 24" 
                fill="none" 
                stroke="currentColor" 
                strokeWidth={strokeWidth} 
                strokeLinecap="round" 
                strokeLinejoin="round" 
                {...props}
            >
                {children}
            </svg>
        );

        const AlertCircle = (props) => (
            <IconBase {...props}>
                <circle cx="12" cy="12" r="10" />
                <line x1="12" x2="12" y1="8" y2="12" />
                <line x1="12" x2="12.01" y1="16" y2="16" />
            </IconBase>
        );

        const Send = (props) => (
            <IconBase {...props}>
                <line x1="22" x2="11" y1="2" y2="13" />
                <polygon points="22 2 15 22 11 13 2 9 22 2" />
            </IconBase>
        );

        const User = (props) => (
            <IconBase {...props}>
                <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2" />
                <circle cx="12" cy="7" r="4" />
            </IconBase>
        );

        const CheckCircle2 = (props) => (
            <IconBase {...props}>
                <circle cx="12" cy="12" r="10" />
                <path d="m9 12 2 2 4-4" />
            </IconBase>
        );

        const UserCheck = (props) => (
            <IconBase {...props}>
                <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2" />
                <circle cx="9" cy="7" r="4" />
                <polyline points="16 11 18 13 22 9" />
            </IconBase>
        );

        const Ban = (props) => (
            <IconBase {...props}>
                <circle cx="12" cy="12" r="10" />
                <path d="m4.9 4.9 14.2 14.2" />
            </IconBase>
        );

        const XCircle = (props) => (
            <IconBase {...props}>
                <circle cx="12" cy="12" r="10" />
                <path d="m15 9-6 6" />
                <path d="m9 9 6 6" />
            </IconBase>
        );

        const BellOff = (props) => (
            <IconBase {...props}>
                <path d="M8.7 3A6 6 0 0 1 18 8a21.3 21.3 0 0 0 .6 5" />
                <path d="M17 17H3s3-2 3-9a6 6 0 0 1 3-5.3" />
                <path d="M10.3 21a1.94 1.94 0 0 0 3.4 0" />
                <path d="m2 2 20 20" />
            </IconBase>
        );

        const ChevronsUp = (props) => (
            <IconBase {...props}>
                <path d="m17 11-5-5-5 5" />
                <path d="m17 18-5-5-5 5" />
            </IconBase>
        );

        // ----------------------------------------------------------------------
        // 2. 核心业务组件
        // ----------------------------------------------------------------------

        // 单个进度条组件 (可复用)
        const ProgressBar = ({ title, steps }) => {
            return (
                <div className="w-full bg-white rounded-lg border border-gray-200 shadow-sm p-6 mb-6">
                    {/* 标题 */}
                    <h2 className="text-gray-700 font-bold text-lg mb-8 border-l-4 border-blue-500 pl-3">
                        {title}
                    </h2>

                    {/* 进度条区域 */}
                    <div className="flex items-start w-full">
                        {steps.map((step, index) => {
                            const isLast = index === steps.length - 1;
                            const isCompleted = step.status === 'completed';
                            const isActive = step.status === 'current';
                            
                            // 决定颜色逻辑
                            const isBlue = isCompleted || isActive;

                            const iconBgColor = isBlue ? 'bg-blue-500' : 'bg-gray-100';
                            const iconColor = isBlue ? 'text-white' : 'text-gray-400';
                            const titleColor = isBlue ? 'text-blue-500' : 'text-gray-400';
                            const ringColor = isBlue ? 'ring-blue-100' : 'ring-transparent';
                            
                            // 线条颜色
                            const lineColor = isBlue ? 'bg-blue-500' : 'bg-gray-100';

                            return (
                                <div key={step.id} className={`flex ${isLast ? 'flex-none' : 'flex-1'} group`}>
                                    <div className="flex items-center">
                                        {/* 图标圆圈 */}
                                        <div className={`relative flex items-center justify-center w-10 h-10 rounded-full ${iconBgColor} ${iconColor} ring-4 ${ringColor} transition-all duration-300 z-10`}>
                                            <step.icon size={20} strokeWidth={2} />
                                        </div>

                                        {/* 文字与时间 */}
                                        <div className="ml-3 flex flex-col justify-center">
                                            <span className={`text-sm font-bold ${titleColor} whitespace-nowrap flex items-center`}>
                                                {step.title}
                                                {step.tag && (
                                                    <span className="ml-2 px-1.5 py-0.5 rounded text-xs font-normal bg-green-100 text-green-600 border border-green-200">
                                                        {step.tag}
                                                    </span>
                                                )}
                                            </span>
                                            
                                            {/* 显示操作人姓名 或 时间范围 */}
                                            {(step.person || step.timeRange) && (
                                                <span className="text-xs text-gray-500 font-medium mt-0.5">
                                                    {step.person || step.timeRange}
                                                </span>
                                            )}

                                            {/* 修改：支持多行时间显示 */}
                                            {step.multiTime ? (
                                                <div className="flex flex-col mt-0.5">
                                                    {step.multiTime.map((t, i) => (
                                                        <span key={i} className="text-xs text-gray-400 font-mono leading-tight">
                                                            {t}
                                                        </span>
                                                    ))}
                                                </div>
                                            ) : (
                                                <span className="text-xs text-gray-400 mt-0.5 font-mono">
                                                    {step.time}
                                                </span>
                                            )}
                                        </div>
                                    </div>

                                    {/* 连接线 (除了最后一个步骤) */}
                                    {!isLast && (
                                        <div className="flex-1 mx-4 flex items-center self-center h-full">
                                            <div className={`h-[2px] w-full ${lineColor} rounded-full mt-[-10px]`}></div>
                                        </div>
                                    )}
                                </div>
                            );
                        })}
                    </div>
                </div>
            );
        };

        const ProgressTracker = () => {
            // 场景 1: 系统自动恢复 (单次通知)
            const stepsSystemRecovery1 = [
                { id: 1, title: '触发告警', time: '10:03:19', status: 'completed', icon: AlertCircle },
                { id: 2, title: '通知发送', time: '10:03:19', status: 'completed', icon: Send },
                { 
                    id: 3, 
                    title: '已解决', 
                    tag: '自动恢复',
                    person: '系统自动恢复 (触发实例用户: 李四(lisi))',
                    time: '10:15:00', 
                    status: 'completed', 
                    icon: CheckCircle2 
                },
            ];

            // 场景 2: 系统自动恢复 (多次通知)
            const stepsSystemRecovery2 = [
                { id: 1, title: '触发告警', time: '10:03:19', status: 'completed', icon: AlertCircle },
                { 
                    id: 2, 
                    title: '通知发送', 
                    multiTime: ['10:03:19 (通知1次)', '10:08:19 (通知2次)'],
                    status: 'completed', 
                    icon: Send 
                },
                { 
                    id: 3, 
                    title: '已解决', 
                    tag: '自动恢复',
                    person: '系统自动恢复 (触发实例用户: 李四(lisi))',
                    time: '10:15:00', 
                    status: 'completed', 
                    icon: CheckCircle2 
                },
            ];

            return (
                <div className="w-full min-h-screen bg-gray-50 flex flex-col items-center justify-start p-8 font-sans">
                    <div className="w-full max-w-5xl">
                        <h1 className="text-2xl font-bold text-gray-800 mb-6">监控事件状态演示 - 系统恢复</h1>
                        
                        <ProgressBar title="场景一：系统自动恢复 (单次通知)" steps={stepsSystemRecovery1} />
                        <ProgressBar title="场景二：系统自动恢复 (多次通知)" steps={stepsSystemRecovery2} />
                    </div>
                </div>
            );
        };

        // 渲染组件到 DOM
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ProgressTracker />);
    </script>
</body>
</html>
